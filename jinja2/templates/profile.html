<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Profile</title>
  </head>
  <body>
    <h2>Hello, {{ name }}</h2>
    {% if is_topper %}
    <p>You are a topper very good</p>
    {% else %} 
    <p>You need to Work Hard..</p>
    {% endif %}

    <ul>
        {% for subject in subjects %}
        <li>{{ subject }}</li>
        {% endfor %}
    </ul>
  </body>
</html>
