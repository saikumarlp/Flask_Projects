<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
    body{
        font-family: Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f5f5f5;
    }

    .container{
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    form{
        display:grid;
        grid-template-columns:100px 220px;
        gap:15px;
        align-items:center;
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    input[type="submit"]{
        grid-column:span 2;
        padding:10px;
        cursor:pointer;
    }

    .error{
        color:red;
        text-align:center;
        margin-top:15px;
    }
</style>

</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form action="/submitlogin" method="post">
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" name="password" id="password" required>

        <input type="submit" value="Login">
    </form>

    <p class="error">{{ error }}</p>
</div>

</body>
</html>
